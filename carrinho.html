<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="stylesheet" href="css/style.css">

  <meta name="description" content="Revise sua sacola na Flor do Sol e finalize seu pedido de plantas e arranjos.">
  <meta property="og:title" content="Meu Carrinho - Flor do Sol">
  <meta property="og:description" content="Revise sua sacola na Flor do Sol.">
  <meta property="og:type" content="website">
  <title>Meu Carrinho - Flor do Sol</title>
</head>

<body class="bg-[#fdfdfd] text-[#1a2e1a] min-h-screen flex flex-col">

  <div id="navbar"></div>

  <main class="flex-1">
    <section class="pt-28 pb-10 max-w-7xl mx-auto px-6">
      <h1 class="text-4xl mb-2">Sua Sacola</h1>
      <p id="cart-info" class="text-sm text-gray-400"></p>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-20">
      <div id="cart-container" class="grid lg:grid-cols-3 gap-10">

        <div id="cart-items" class="lg:col-span-2 space-y-6"></div>

        <div id="entrega-section" class="lg:col-span-2 hidden">
          <h2 class="text-xl mb-6">Endereço de Entrega</h2>
          <form id="form-entrega" novalidate class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="sm:col-span-2 lg:col-span-3">
              <label class="block text-sm mb-1">Nome completo</label>
              <input type="text" name="nome" required
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div>
              <label class="block text-sm mb-1">CEP</label>
              <input type="text" name="cep" required maxlength="9" placeholder="00000-000"
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div class="sm:col-span-2">
              <label class="block text-sm mb-1">Rua</label>
              <input type="text" name="rua" required
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div>
              <label class="block text-sm mb-1">Número</label>
              <input type="text" name="numero" required
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div>
              <label class="block text-sm mb-1">Complemento</label>
              <input type="text" name="complemento"
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>

            <div>
              <label class="block text-sm mb-1">Bairro</label>
              <input type="text" name="bairro" required
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div class="sm:col-span-2 lg:col-span-2">
              <label class="block text-sm mb-1">Cidade</label>
              <input type="text" name="cidade" required
                     class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
              <p class="erro text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <div class="sm:col-span-2 lg:col-span-3 flex items-end justify-end gap-3">
              <button type="button" id="btn-limpar-entrega"
                      class="border border-gray-300 px-6 py-2 rounded-full hover:bg-gray-100 transition text-sm">
                Limpar
              </button>
              <button type="submit"
                      class="bg-[#1a2e1a] text-white px-8 py-2 rounded-full hover:opacity-90 transition text-sm">
                Salvar endereço
              </button>
            </div>
          </form>

          <div id="entrega-resumo" class="hidden border rounded-xl p-5 mt-6">
            <div class="flex items-start justify-between">
              <div>
                <h3 class="font-medium mb-2">Endereço de Entrega</h3>
                <p id="resumo-nome" class="text-sm font-medium"></p>
                <p id="resumo-endereco" class="text-sm text-gray-500"></p>
                <p id="resumo-bairro" class="text-sm text-gray-500"></p>
                <p id="resumo-cidade" class="text-sm text-gray-500"></p>
              </div>
              <button type="button" id="btn-editar-entrega"
                      class="text-sm text-[#1a2e1a] underline hover:no-underline">
                Editar
              </button>
            </div>
          </div>
        </div>

        <div class="border rounded-xl p-6 h-fit">
          <h2 class="text-xl mb-4">Resumo</h2>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span id="subtotal">R$ 0</span>
            </div>
            <div class="flex justify-between text-gray-400">
              <span>Frete</span>
              <span id="frete">A combinar</span>
            </div>
            <div class="flex justify-between text-lg font-bold mt-4">
              <span>Total</span>
              <span id="total">R$ 0</span>
            </div>
          </div>
          <button onclick="finalizarPedido()"
                  class="w-full bg-[#1a2e1a] text-white py-3 rounded-full mt-6 hover:opacity-90 transition">
            Finalizar via WhatsApp
          </button>
        </div>
      </div>

      <div id="empty-state" class="hidden text-center py-20">
        <p class="text-gray-400 mb-4">Sua sacola está vazia 🌿</p>
        <a href="catalogo.html"
           class="border border-[#1a2e1a] px-6 py-2 rounded-full hover:bg-[#1a2e1a] hover:text-white transition">
          Voltar ao catálogo
        </a>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- MODAL DE LOGIN -->
  <div id="modal-login" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="fecharLogin()"></div>
    <div class="absolute inset-0 overflow-y-auto">
      <div class="min-h-full flex items-center justify-center p-4">
        <div class="bg-[#fdfdfd] rounded-2xl w-full max-w-md shadow-2xl relative p-8">
          <button onclick="fecharLogin()" class="absolute top-4 right-4 p-2 hover:bg-gray-100 rounded-full transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          <div class="flex gap-4 mb-6 border-b">
            <button id="tab-entrar" class="tab-auth active pb-2 text-sm font-medium border-b-2 transition" onclick="alternarAuth('entrar')">Entrar</button>
            <button id="tab-cadastrar" class="tab-auth pb-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-[#1a2e1a] transition" onclick="alternarAuth('cadastrar')">Cadastrar</button>
          </div>
          <form id="form-entrar" class="auth-form">
            <p class="text-sm text-gray-400 mb-6">Acesse sua conta para acompanhar pedidos.</p>
            <div class="mb-4">
              <label class="block text-sm mb-1">E-mail</label>
              <input type="email" name="email" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <div class="mb-6">
              <label class="block text-sm mb-1">Senha</label>
              <input type="password" name="senha" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <button type="submit" class="w-full bg-[#1a2e1a] text-white py-3 rounded-full hover:opacity-90 transition">Entrar</button>
          </form>
          <form id="form-cadastrar" class="auth-form hidden">
            <p class="text-sm text-gray-400 mb-6">Crie sua conta para fazer pedidos.</p>
            <div class="mb-4">
              <label class="block text-sm mb-1">Nome completo</label>
              <input type="text" name="nome" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <div class="mb-4">
              <label class="block text-sm mb-1">E-mail</label>
              <input type="email" name="email" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <div class="mb-4">
              <label class="block text-sm mb-1">Senha</label>
              <input type="password" name="senha" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <div class="mb-6">
              <label class="block text-sm mb-1">Confirmar senha</label>
              <input type="password" name="confirmar" required class="w-full border rounded-full px-4 py-2 outline-none focus:border-[#1a2e1a] transition">
            </div>
            <button type="submit" class="w-full bg-[#1a2e1a] text-white py-3 rounded-full hover:opacity-90 transition">Criar conta</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/carrinho.js"></script>
  <script src="js/entrega.js"></script>
  <script src="js/login.js"></script>
  <script src="js/components.js"></script>

</body>
</html>
