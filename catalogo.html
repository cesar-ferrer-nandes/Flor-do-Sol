<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- METADADOS GLOBAIS -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fontes do Google -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <!-- Estilos customizados -->
  <link rel="stylesheet" href="css/style.css">

  <!-- SEO e Open Graph -->
  <meta name="description" content="Explore nosso catálogo de plantas, arranjos e serviços especiais. Floresça seu espaço com a Flor do Sol.">
  <meta property="og:title" content="Catálogo - Flor do Sol">
  <meta property="og:description" content="Explore nosso catálogo de plantas, arranjos e serviços especiais.">
  <meta property="og:type" content="website">
  <title>Catálogo - Flor do Sol</title>
</head>

<body class="bg-[#fdfdfd] text-[#1a2e1a]">

  <!-- NAVBAR: injetado via components.js -->
  <div id="navbar"></div>

  <!-- HEADER DA PÁGINA -->
  <section class="pt-28 pb-10 text-center">
    <p class="text-sm text-gray-400 mb-2">Início > Catálogo</p>
    <h1 class="text-4xl mb-3">Nosso Jardim</h1>
    <p class="text-gray-500 max-w-xl mx-auto">Explore nossa seleção exclusiva de plantas e arranjos.</p>
  </section>

  <!-- TOOLBAR: busca, filtros por categoria e ordenação -->
  <section class="max-w-7xl mx-auto px-6 mb-10">
    <div class="flex flex-col md:flex-row md:items-center gap-4 justify-between">
      <!-- Campo de busca textual -->
      <input id="search" type="text" placeholder="Pesquisar..."
             class="w-full md:w-1/3 bg-gray-100 rounded-full px-5 py-3 outline-none">
      <!-- Abas de categoria -->
      <div class="flex flex-wrap gap-2 justify-center">
        <button class="tab active" data-cat="todos">Tudo</button>
        <button class="tab" data-cat="plantas">Plantas</button>
        <button class="tab" data-cat="arranjos">Arranjos</button>
        <button class="tab" data-cat="servicos">Serviços</button>
      </div>
      <!-- Seletor de ordenação por preço -->
      <select id="sort" class="border rounded-full px-4 py-2">
        <option value="default">Ordenar</option>
        <option value="menor">Menor preço</option>
        <option value="maior">Maior preço</option>
      </select>
    </div>
  </section>

  <!-- GRID DE PRODUTOS: renderizado via catalogo.js -->
  <section class="max-w-7xl mx-auto px-6 pb-20">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    <!-- Estado vazio: exibido quando nenhum produto corresponde aos filtros -->
    <div id="empty" class="hidden text-center py-20 text-gray-400">Nenhum produto encontrado 🌿</div>
  </section>

  <!-- Container para notificações toast -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- FOOTER: injetado via components.js -->
  <div id="footer"></div>

  <!-- MODAL DE PRODUTO: detalhes expandidos com especificações -->
  <div id="modal-produto" class="fixed inset-0 z-50 hidden">
    <div class="modal-backdrop absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="fecharModal()"></div>
    <div class="absolute inset-0 overflow-y-auto">
      <div class="min-h-full flex items-center justify-center p-4">
        <div class="modal-content bg-[#fdfdfd] rounded-2xl w-full max-w-5xl shadow-2xl relative">
          <button onclick="fecharModal()"
                  class="absolute top-4 right-4 z-10 p-2 bg-white/80 rounded-full hover:bg-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
          <div id="modal-body"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS: cart.js deve vir primeiro (fornece estado global) -->
  <script src="js/cart.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/catalogo.js"></script>
  <script src="js/components.js"></script>

</body>
</html>
