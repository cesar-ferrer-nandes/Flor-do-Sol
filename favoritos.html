<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- METADADOS GLOBAIS -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://viacep.com.br; frame-src 'self' https://wa.me;">

  <!-- Fontes do Google: Playfair Display para títulos, Inter para textos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap">

  <!-- Tailwind CSS via CDN com plugin de tipografia -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <!-- Estilos customizados -->
  <link rel="stylesheet" href="css/style.css">

  <!-- SEO e Open Graph -->
  <meta name="description" content="Meus Favoritos - Flor do Sol. Sua seleção especial de plantas e arranjos preferidos.">
  <meta property="og:title" content="Meus Favoritos - Flor do Sol">
  <meta property="og:description" content="Sua seleção especial de plantas e arranjos preferidos.">
  <meta property="og:type" content="website">
  <title>Meus Favoritos - Flor do Sol</title>
</head>

<body class="bg-[#fdfdfd] text-[#1a2e1a]">

  <!-- NAVBAR: injetado via components.js -->
  <div id="navbar"></div>

  <!-- HEADER DA PÁGINA: breadcrumb, título e subtítulo -->
  <section class="pt-28 pb-10 text-center">
    <p class="text-sm text-gray-400 mb-2">Início > Favoritos</p>
    <h1 class="text-4xl mb-3">Meus Favoritos</h1>
    <p class="text-gray-500 max-w-xl mx-auto">
      Sua seleção especial — as plantas e arranjos que mais encantaram você.
    </p>
    <p id="favoritos-count-info" class="text-sm text-gray-400 mt-2"></p>
  </section>

  <!-- GRID DE FAVORITOS: renderizado via favoritos.js -->
  <section class="max-w-7xl mx-auto px-6 pb-20">
    <div id="favoritos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>

    <!-- ESTADO VAZIO: exibido quando não há favoritos salvos -->
    <div id="empty-state" class="hidden text-center py-20">
      <svg class="w-16 h-16 mx-auto mb-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
      </svg>
      <p class="text-gray-400 text-lg mb-2">Você ainda não escolheu suas plantas favoritas</p>
      <p class="text-gray-400 text-sm mb-8">Explore nosso catálogo e salve seus itens preferidos.</p>
      <a href="catalogo.html"
         class="inline-block bg-[#1a2e1a] text-white px-8 py-3 rounded-full hover:opacity-90 transition">
        Explorar Catálogo
      </a>
    </div>
  </section>

  <!-- Container para notificações toast (inseridas via toast.js) -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- MODAL DE PRODUTO: overlay com detalhes do produto, controlado via catalogo.js -->
  <div id="modal-produto" class="fixed inset-0 z-50 hidden">
    <div class="modal-backdrop absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="fecharModal()"></div>
    <div class="absolute inset-0 overflow-y-auto">
      <div class="min-h-full flex items-center justify-center p-4">
        <div class="modal-content bg-[#fdfdfd] rounded-2xl w-full max-w-5xl shadow-2xl relative">
          <button onclick="fecharModal()" class="absolute top-4 right-4 z-10 p-2 bg-white/80 rounded-full hover:bg-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          <div id="modal-body"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER: injetado via components.js -->
  <div id="footer"></div>

  <!-- MODAL DE LOGIN: injetado via components.js -->
  <div id="modal-login" class="fixed inset-0 z-[60] hidden"></div>

  <!-- SCRIPTS: ordem de carregamento respeita dependências -->
  <script src="js/utils.js"></script>      <!-- Utilitários (escapeHtml, parseJSONSafe) -->
  <script src="js/product-card.js"></script> <!-- Card de produto compartilhado -->
  <script src="js/cart.js"></script>       <!-- Constante WHATSAPP_NUMBER e estado do carrinho -->
  <script src="js/toast.js"></script>      <!-- Notificações toast -->
  <script src="js/auth.js"></script>       <!-- Autenticação -->
  <script src="js/catalogo.js"></script>   <!-- Dados dos produtos e funções de modal -->
  <script src="js/favoritos.js"></script>  <!-- Gerenciamento de favoritos -->
  <script src="js/login.js"></script>      <!-- Modal de login -->
  <script src="js/components.js"></script> <!-- Injeção de navbar/footer + scroll reveal -->

</body>
</html>
