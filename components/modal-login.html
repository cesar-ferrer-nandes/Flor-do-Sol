<div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="fecharLogin()"></div>
<div class="absolute inset-0 overflow-y-auto">
  <div class="min-h-full flex items-center justify-center p-4">
    <div class="bg-[#fdfdfd] rounded-3xl w-full max-w-md shadow-2xl relative overflow-hidden">

      <!-- Decorative top bar -->
      <div class="h-2 bg-gradient-to-r from-[#1a2e1a] via-[#aea100] to-[#1a2e1a]"></div>

      <!-- Close button -->
      <button onclick="fecharLogin()" class="absolute top-6 right-6 z-10 p-2 hover:bg-gray-100 rounded-full transition">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <div class="p-8 pt-6">
        <!-- Brand header -->
        <div class="text-center mb-8">
          <div class="w-14 h-14 bg-[#1a2e1a]/5 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-[#1a2e1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <h2 class="text-2xl font-playfair text-[#1a2e1a] mb-1">Flor do Sol</h2>
          <p class="text-sm text-gray-400">Entre ou crie sua conta</p>
        </div>

        <!-- Auth tabs -->
        <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
          <button id="tab-entrar" class="tab-auth flex-1 py-2.5 text-sm font-medium rounded-lg transition-all duration-200 active" onclick="alternarAuth('entrar')">Entrar</button>
          <button id="tab-cadastrar" class="tab-auth flex-1 py-2.5 text-sm font-medium rounded-lg transition-all duration-200 text-gray-400 hover:text-[#1a2e1a]" onclick="alternarAuth('cadastrar')">Cadastrar</button>
        </div>

        <!-- Login form -->
        <form id="form-entrar" class="auth-form space-y-4">
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">E-mail</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input type="email" name="email" required placeholder="seu@email.com" class="input-field w-full pl-11">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">Senha</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input type="password" name="senha" required placeholder="••••••••" class="input-field w-full pl-11">
            </div>
          </div>
          <div class="flex justify-end">
            <a href="#" class="text-xs text-[#aea100] hover:underline">Esqueceu a senha?</a>
          </div>
          <button type="submit" class="btn-primary w-full mt-2">Entrar</button>
        </form>

        <!-- Register form -->
        <form id="form-cadastrar" class="auth-form hidden space-y-4">
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">Nome completo</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input type="text" name="nome" required placeholder="Seu nome" class="input-field w-full pl-11">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">E-mail</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input type="email" name="email" required placeholder="seu@email.com" class="input-field w-full pl-11">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">Senha</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input type="password" name="senha" required placeholder="Mínimo 6 caracteres" class="input-field w-full pl-11">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-[#1a2e1a] mb-1.5">Confirmar senha</label>
            <div class="relative">
              <svg class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
              <input type="password" name="confirmar" required placeholder="Repita a senha" class="input-field w-full pl-11">
            </div>
          </div>
          <p class="text-xs text-gray-400">Ao criar sua conta, você aceita nossos <a href="termos.html" class="text-[#aea100] hover:underline">Termos de Uso</a>.</p>
          <button type="submit" class="btn-primary w-full">Criar conta</button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400">ou</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Continue without account -->
        <div class="text-center">
          <p class="text-xs text-gray-400 mb-3">Prefere continuar sem conta?</p>
          <a href="catalogo.html"
             class="inline-block w-full border-2 border-gray-200 text-[#1a2e1a] py-2.5 rounded-full text-sm font-medium hover:border-[#1a2e1a] hover:bg-[#1a2e1a]/5 transition">
            Continuar como visitante
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
