<!-- NAVBAR: barra de navegação fixa com backdrop blur, carregada via components.js em todas as páginas -->
<header class="fixed w-full top-0 z-50 bg-white/70 backdrop-blur-md transition-all duration-300 border-b border-gray-200">
  <nav class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">

    <!-- Logo: link para a home -->
    <a href="index.html"><img src="assets/icons/Logo.svg" class="h-16" alt="Flor do Sol"></a>

    <!-- Menu de navegação principal (desktop) -->
    <ul class="hidden md:flex space-x-8 text-base">
      <li><a href="index.html" class="nav-link">Início</a></li>
      <li><a href="catalogo.html" class="hover:text-[#aea100] transition">Catálogo</a></li>
      <li><a href="dicas.html" class="hover:text-[#aea100] transition">Dicas e Cuidados</a></li>
    </ul>

    <!-- Ícones de ação -->
    <div class="flex items-center gap-4">
      <!-- Favoritos: badge atualizado via favoritos.js -->
      <a href="favoritos.html" class="relative">
        <img src="assets/icons/fav.svg" class="w-5 h-5 text-[#1a2e1a]" alt="Favoritos">
        <span id="favoritos-count"
              class="absolute -top-2 -right-3 bg-[#aea100] text-white text-xs px-2 py-0.5 rounded-full hidden">0</span>
      </a>
      <!-- Carrinho: badge atualizado via cart.js -->
      <a href="carrinho.html" class="relative">
        <img src="assets/icons/Icon_Car.svg" class="w-5 h-5" alt="Carrinho">
        <span id="cart-count"
              class="absolute -top-2 -right-3 bg-[#aea100] text-white text-xs px-2 py-0.5 rounded-full">0</span>
      </a>
      <!-- Login: acesso à área do cliente (exibido quando DESLOGADO) -->
      <button id="login-btn" onclick="abrirLogin()"
              class="flex items-center justify-center p-2 rounded-full hover:bg-[#1a2e1a]/10 transition">
        <svg class="w-5 h-5 text-[#1a2e1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </button>

      <!-- Menu do usuário (exibido quando LOGADO) -->
      <div id="user-menu" class="hidden relative">
        <button onclick="toggleUserMenu()"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-full hover:bg-[#1a2e1a]/10 transition text-sm">
          <span id="user-name" class="font-medium text-[#1a2e1a] max-w-[120px] truncate"></span>
          <svg class="w-4 h-4 text-[#1a2e1a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="user-dropdown"
             class="hidden absolute right-0 top-full mt-2 bg-white rounded-xl shadow-lg border min-w-[180px] py-2 z-50">
          <a href="meus-pedidos.html"
             class="block px-4 py-2 text-sm hover:bg-gray-50 transition">Meus Pedidos</a>
          <hr class="my-1 border-gray-100">
          <button onclick="logout()"
                  class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50 transition">Sair</button>
        </div>
      </div>
    </div>

  </nav>
</header>
